# syslog-ng configuration — Flask app logs -> Zerobus Ingest OTLP
#
# Pipeline:
#   1. Reads syslog messages from the Unix socket the Flask app writes to.
#   2. Maps standard syslog fields to OpenTelemetry log attributes.
#   3. Forwards to Zerobus Ingest via OTLP/gRPC with automatic OAuth2 token management.
#
# Requirements: syslog-ng 4.11 or higher
# Docs: https://docs.databricks.com/aws/en/ingestion/opentelemetry/configure

@version: current
@include "scl.conf"

# ── Variables — fill these in before running ───────────────────────────────────
# Find your workspace ID and region:
# https://docs.databricks.com/aws/en/ingestion/zerobus-ingest#get-your-workspace-url-and-zerobus-ingest-endpoint
@define workspace_id       "<YOUR_WORKSPACE_ID>"
@define workspace_region   "<YOUR_REGION>"          # e.g. us-west-2
@define workspace_url      "<YOUR_WORKSPACE_URL>"   # e.g. my-workspace.cloud.databricks.com
@define client_id          "<YOUR_CLIENT_ID>"       # Service principal app ID (UUID)
@define client_secret      "<YOUR_CLIENT_SECRET>"   # Service principal OAuth secret
@define catalog            "<YOUR_CATALOG>"
@define schema             "<YOUR_SCHEMA>"
@define table              "<YOUR_TABLE>"           # e.g. health_monitor_logs

options {
    threaded(yes);
};

# ── Source: Unix socket the Flask app writes to ────────────────────────────────
source s_flask {
    unix-dgram("/tmp/flask-app.sock"
        keep-hostname(yes)
    );
};

# ── Rewrite: map syslog fields to OpenTelemetry log attributes ─────────────────
rewrite r_to_otlp {
    # Signal type — tells syslog-ng this is a log record
    set("log"                                   value(".otel.type"));

    # Timestamps (syslog seconds -> nanoseconds)
    set("$(* $S_UNIXTIME 1000000000)"           value(".otel.log.time_unix_nano"));
    set("$(* $R_UNIXTIME 1000000000)"           value(".otel.log.observed_time_unix_nano"));

    # Severity
    set("$LEVEL_NUM"                            value(".otel.log.severity_number"));
    set("$(uppercase $LEVEL)"                   value(".otel.log.severity_text"));

    # Log body
    set("$MESSAGE"                              value(".otel.log.body"));

    # Span/trace correlation (empty for syslog sources, included for schema compliance)
    set(""                                      value(".otel.log.trace_id"));
    set(""                                      value(".otel.log.span_id"));

    # Resource attributes — service.name here populates the top-level service_name column
    set("$PROGRAM"                              value(".otel.resource.attributes.service.name"));

    # Log attributes
    set("$HOST"                                 value(".otel.log.attributes.host.name"));
    set("$PID"                                  value(".otel.log.attributes.process.pid"));

    # Syslog-specific attributes
    set("$FACILITY"                             value(".otel.log.attributes.syslog.facility"));
    set("$FACILITY_NUM"                         value(".otel.log.attributes.syslog.facility.code"));
    set("$PRI"                                  value(".otel.log.attributes.syslog.priority"));

    # Event name and instrumentation scope
    set("syslog.$FACILITY.$PROGRAM"             value(".otel.log.attributes.event.name"));
    set("syslog-ng-otel-exporter"               value(".otel.scope.name"));
};

# ── Destination: Zerobus Ingest via OTLP/gRPC ─────────────────────────────────
destination d_zerobus_logs {
    opentelemetry(
        url("`workspace_id`.zerobus.`workspace_region`.cloud.databricks.com:443")
        persist-name("zerobus_logs")

        # Target Unity Catalog table
        headers(
            "x-databricks-zerobus-table-name" => "`catalog`.`schema`.`table`"
        )

        # OAuth2 — automatic token fetch and refresh (no manual token rotation needed)
        cloud-auth(
            oauth2(
                client_id("`client_id`")
                client_secret("`client_secret`")
                token_url("https://`workspace_url`/oidc/v1/token")
                scope("all-apis")
                resource("api://databricks/workspaces/`workspace_id`/zerobusDirectWriteApi")
                authorization_details('[
                    {
                        "type": "unity_catalog_privileges",
                        "object_type": "CATALOG",
                        "object_full_path": "`catalog`",
                        "privileges": ["USE CATALOG"]
                    },
                    {
                        "type": "unity_catalog_privileges",
                        "object_type": "SCHEMA",
                        "object_full_path": "`catalog`.`schema`",
                        "privileges": ["USE SCHEMA"]
                    },
                    {
                        "type": "unity_catalog_privileges",
                        "object_type": "TABLE",
                        "object_full_path": "`catalog`.`schema`.`table`",
                        "privileges": ["SELECT", "MODIFY"]
                    }
                ]')
                auth_method(basic)
            )
        )

        # TLS — required for Zerobus endpoints
        auth(tls())

        # Throughput tuning
        workers(4)
        batch-lines(50)
    );
};

# ── Pipeline ───────────────────────────────────────────────────────────────────
log {
    source(s_flask);
    rewrite(r_to_otlp);
    destination(d_zerobus_logs);
};
